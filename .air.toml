[build]
cmd = "go build -o ./tmp/main ."
entrypoint = "./tmp/main"
log = "air_build.log"
delay = 500
send_interrupt = true
stop_on_error = true
kill_delay = 500
include_ext = ["go", "html", "css", "js"]
include_dir = ["static"]

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

